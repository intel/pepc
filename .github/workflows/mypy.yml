permissions:
  contents: "read"

on:
  workflow_call:
    inputs:
      runs_on:
        type: string
        required: false
        default: 'ubuntu-latest'
      python_version:
        type: string
        required: false
        default: '3.13'

jobs:
  checks:
    runs-on: ${{ inputs.runs_on }}

    steps:
      - name: "Install packages"
        run: |
          sudo -E apt-get -o Acquire::Retries=30 -qq update
          sudo -E apt-get -o Acquire::Retries=30 -qq -y install file

      - name: "Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Information about changes"
        run: |
          # Determine the base commit for comparison based on the event type
          [ "${{ github.event_name }}" = "push" ] &&
            from="${{ github.event.before }}" ||
            from="${{ github.event.pull_request.base.sha }}"

          printf "DEBUG: github.event_name='%s'\n" "${{ github.event_name }}"
          printf "DEBUG: from='%s'\n" "$from"

          # List all commits in the range and display them
          git rev-list --pretty=oneline "$from..HEAD" --

      - name: "Set up Python ${{ inputs.python_version }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'

      - name: "Install dependencies"
        run: |
          python -m pip install --upgrade pip

          pip install --upgrade .
          pip install mypy pytest types-pyyaml types-paramiko types-colorama pytest-mypy

      - name: "Find modified files"
        run: |
          # Determine the base commit for comparison based on the event type
          # For push events, use the default branch
          # For pull requests, use the base commit of the PR
          [ "${{ github.event_name }}" = "push" ] &&
            from="${{ github.event.before }}" ||
            from="${{ github.event.pull_request.base.sha }}"

          printf "DEBUG: github.event_name='%s'\n" "${{ github.event_name }}"
          printf "DEBUG: from='%s'\n" "$from"

          mkdir -- .tmp
          touch .tmp/modified-files

          # Find modified files, filter for Python scripts, and save them to modified-files.
          # Exclude .md files which may be misdetected as Python due to code examples.
          git diff-tree --diff-filter=d --no-commit-id --name-status -r "$from..HEAD" | \
            cut -f2- | xargs -r file -Ni -- | \
            sed -n -e 's#: text/x-script.python;.*##p' | \
            { grep -v '\.md$' || true; } > .tmp/modified-files

      - name: "Print modified files"
        run: |
          cat .tmp/modified-files

      - name: "Run mypy for type checking on modified files"
        run: |
          # TODO: add --strict flag and remove --follow-imports=silent once the code is fully typed.
          # Pass all .py files together in one invocation (efficient, no name conflicts).
          # Run extensionless scripts one-by-one to avoid "duplicate module" errors: mypy maps
          # them all to '__main__', conflicting with each other and with '__main__.py'.
          grep '\.py$' .tmp/modified-files | \
            xargs -r mypy --follow-imports=silent -- >> .tmp/mypy.results || retcode=1
          for f in $(grep -v '\.py$' .tmp/modified-files); do
            mypy --follow-imports=silent -- "$f" >> .tmp/mypy.results || retcode=1
          done

          echo "$retcode" > .tmp/mypy.retcode

          # Format the mypy output for GitHub annotations
          sed < .tmp/mypy.results -r -n \
            -e 's#^(.*):([0-9]+): ([^:]+): (.*)#::\3 file=\1,line=\2,col=1::[mypy] \1:\2:\4#' \
            -e 's#::note #::notice #' \
            -e '/^::/p'

      - name: "Display raw mypy results"
        run: |
          cat .tmp/mypy.results

          retcode=$(< .tmp/mypy.retcode)
          exit ${retcode:-0}
